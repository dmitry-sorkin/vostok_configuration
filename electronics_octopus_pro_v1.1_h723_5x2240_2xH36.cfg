# Базовая конфигурация VOSTOK v9.x
# ------------------------
# Файл распространяется под лицензией CC-BY 4.0
# ------------------------
#
# Плата: BigTreeTech Octopus Pro v1.1 H723
# Коммутационные платы: 2x Fysetc H36 v1.3
# Драйверы: 5x tmc2240
# Датчик автоуровня: BTT Microprobe
# Доп.оборудование: подсветка отсека печати
#
# Коммутационные платы подключаются по CAN. Секции в printer.cfg
# должны называться [mcu T0CB] и [mcu T1CB] для левой и правой
# печатающей головы соответственно
#
#--------------------------------------------------------
#          Оборудование             |      Разъём       |
#-----------------------------------|-------------------|
# Мотор оси X                       | MOTOR2            |
# Мотор оси W                       | MOTOR0            |
# Левый мотор оси Y                 | MOTOR3            |
# Правый мотор оси Y                | MOTOR1            |
# Мотор оси Z                       | MOTOR7            |
# Мотор фидера левой головы         | T0CB:MOTOR        |
# Мотор фидера правой головы        | T1CB:MOTOR        |
# Нагреватель левой головы          | T0CB:HE0          |
# Нагреватель правой головы         | T1CB:HE0          |
# Нагреватель стола                 | HE2               |
# Термистор левой головы            | T0CB:TE0          |
# Термистор правой головы           | T1CB:TE0          |
# Термистор стола                   | TB                |
# Охлаждение хотэнда левой головы   | T0CB:Fan2         |
# Охлаждение хотэнда правой головы  | T1CB:Fan2         |
# Охлаждение модели                 | FAN2              |
# Охлаждение отсека электроники     | FAN3              |
# Концевик оси X                    | T0CB:IO2          |
# Концевик оси W                    | T1CB:IO2          |
# Концевик оси Y левый              | STOP0             |
# Концевик оси Y правый             | STOP1             |
# Датчик автоуровня                 | T0CB:IO0+1        |
# Подсветка отсека печати           | HE3               |
#--------------------------------------------------------

#########################################################
# Двигатели
#########################################################

[stepper motor_x]
step_pin: PF11
dir_pin: PG3
enable_pin: !PG5
full_steps_per_rotation: 200

[stepper motor_w]
step_pin: PF13
dir_pin: PF12
enable_pin: !PF14
full_steps_per_rotation: 200

[stepper motor_yl]
step_pin: PG4
dir_pin: PC1
enable_pin: !PA2
full_steps_per_rotation: 200

[stepper motor_yr]
step_pin: PG0
dir_pin: !PG1
enable_pin: !PF15
full_steps_per_rotation: 200

[stepper motor_z]
step_pin: PE6
dir_pin: PA14
enable_pin: !PE0
full_steps_per_rotation: 200

[extruder]
step_pin: T0CB:PB9
dir_pin: T0CB:PB8
enable_pin: !T0CB:PB7
full_steps_per_rotation: 200

[extruder1]
step_pin: T1CB:PB9
dir_pin: !T1CB:PB8
enable_pin: !T1CB:PB7
full_steps_per_rotation: 200

#########################################################
# Драйверы
#########################################################

[tmc2240 stepper motor_x]
cs_pin: PC4
spi_software_sclk_pin: PA5
spi_software_mosi_pin: PA7
spi_software_miso_pin: PA6
run_current: 1.6
stealthchop_threshold: 0
interpolate: False

[tmc2240 stepper motor_w]
cs_pin: PD11
spi_software_sclk_pin: PA5
spi_software_mosi_pin: PA7
spi_software_miso_pin: PA6
run_current: 1.6
stealthchop_threshold: 0
interpolate: False

[tmc2240 stepper motor_yl]
cs_pin: PC6
spi_software_sclk_pin: PA5
spi_software_mosi_pin: PA7
spi_software_miso_pin: PA6
run_current: 1.6
stealthchop_threshold: 0
interpolate: False

[tmc2240 stepper motor_yr]
cs_pin: PC7
spi_software_sclk_pin: PA5
spi_software_mosi_pin: PA7
spi_software_miso_pin: PA6
run_current: 1.6
stealthchop_threshold: 0
interpolate: False

[tmc2240 stepper motor_z]
cs_pin: PD3
spi_software_sclk_pin: PA5
spi_software_mosi_pin: PA7
spi_software_miso_pin: PA6
run_current: 1.2
stealthchop_threshold: 999999
interpolate: True

[tmc2209 extruder]
uart_pin: T0CB:PC14
interpolate: false
run_current: 0.9
sense_resistor: 0.110
stealthchop_threshold: 0

[tmc2209 extruder1]
uart_pin: T1CB:PC14
interpolate: false
run_current: 0.7
sense_resistor: 0.110
stealthchop_threshold: 0

#########################################################
# Концевики и датчик автоуровня
#########################################################

[carriage xc]
endstop_pin: ^T0CB:PA8

[dual_carriage wc]
endstop_pin: ^T1CB:PA8

[carriage ylc]
endstop_pin: ^PG6

[extra_carriage yrc]
endstop_pin: ^PG9

[probe]
pin: ^!T0CB:PC7

[output_pin probe_enable]
pin: T0CB:PA15
value: 0

[gcode_macro PROBE_DEPLOY]
gcode:
    SET_PIN PIN=probe_enable VALUE=1

[gcode_macro PROBE_STOW]
gcode:
    SET_PIN PIN=probe_enable VALUE=0

#########################################################
# Нагреватели и термисторы
#########################################################

[extruder]
heater_pin: T0CB:PA7
sensor_pin: T0CB:PA6
pullup_resistor: 2200

[extruder1]
heater_pin: T1CB:PA7
sensor_pin: T1CB:PA6
pullup_resistor: 2200

[heater_bed]
heater_pin: PB0
sensor_pin: PF3

#########################################################
# Вентиляторы
#########################################################

[fan]
pin: !PD12

[heater_fan e0_fan]
pin: T0CB:PB13

[heater_fan e1_fan]
pin: T1CB:PB13

[controller_fan electronics_fan]
pin: PD13

#########################################################
# Подсветка
#########################################################

[led print_chamber_led]
white_pin: PB11
initial_WHITE: 1.0

#########################################################
# Акселерометры
#########################################################

[adxl345 t0_accelerometer]
cs_pin: T0CB:PB12
spi_software_sclk_pin: T0CB:PB10
spi_software_mosi_pin: T0CB:PB11
spi_software_miso_pin: T0CB:PB2
axes_map: -y,z,-x

[adxl345 t1_accelerometer]
cs_pin: T1CB:PB12
spi_software_sclk_pin: T1CB:PB10
spi_software_mosi_pin: T1CB:PB11
spi_software_miso_pin: T1CB:PB2
axes_map: -y,z,-x

[resonance_tester]
accel_chip: adxl345 t0_accelerometer
probe_points:
    200,125,20

#########################################################
# Состояние электроники
#########################################################

[temperature_sensor RPi4]
sensor_type: temperature_host

[temperature_sensor Motherboard]
sensor_type: temperature_mcu

[temperature_sensor T0CB_mcu]
sensor_type: temperature_mcu
sensor_mcu: T0CB
min_temp: 0
max_temp: 150

[temperature_sensor T0CB_driver]
sensor_type: Generic 3950
sensor_pin: T0CB:PA3
min_temp:0
max_temp:150

[temperature_sensor T1CB_mcu]
sensor_type: temperature_mcu
sensor_mcu: T1CB
min_temp: 0
max_temp: 150

[temperature_sensor T1CB_driver]
sensor_type: Generic 3950
sensor_pin: T1CB:PA3
min_temp:0
max_temp:150